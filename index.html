<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RepTools — Tools Layout: pick one</title><link rel="stylesheet" href="brand.css">
<style>body{background:var(--ink);color:var(--bone);font-family:var(--font-body);margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem}
.box{max-width:560px;text-align:center}h1{font-family:var(--font-display);text-transform:uppercase;font-size:clamp(2rem,6vw,3.4rem);line-height:.9;margin:0 0 .6rem}
h1 em{color:var(--hazard);font-style:normal}p{font-family:var(--font-mono);font-size:.8rem;color:var(--bone-dim);margin:0 0 2rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}@media(max-width:520px){.row{grid-template-columns:1fr}}
a.opt{display:block;border:2px solid var(--ink-line);background:var(--ink-raised);padding:1.6rem 1rem;text-decoration:none;color:var(--bone);
font-family:var(--font-display);text-transform:uppercase;font-size:1.3rem;box-shadow:5px 5px 0 rgba(0,0,0,.5);transition:.12s}
a.opt:hover{border-color:var(--hazard);transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--hazard)}
a.opt span{display:block;font-family:var(--font-mono);font-size:.62rem;color:var(--bone-dim);margin-top:.5rem;letter-spacing:.08em}</style>
</head><body><div class="box"><h1>Tools page — <em>pick one</em></h1>
<p>// same site, two different tools sections. open both, tell me which.</p>
<div class="row">
<a class="opt" href="option1/">Layout 1<span>Centered</span></a>
<a class="opt" href="option3/">Layout 3<span>Poster</span></a>
</div></div></body></html>
